<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상패다 문구 도우미</title>
  <style>
    :root { --navy: #1a2a44; --gold: #c5a059; }
    body { background: #f4f4f5; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; padding: 20px; }
    .container { max-width: 750px; margin: 0 auto; padding: 40px; background: #fff; border-top: 5px solid var(--navy); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { color: var(--navy); text-align: center; margin-bottom: 30px; letter-spacing: -1px; }
    .section-title { font-size: 15px; color: var(--navy); border-bottom: 2px solid var(--navy); padding-bottom: 5px; margin: 25px 0 10px 0; font-weight: bold; }
    .btn-group { margin-bottom: 15px; }
    button { padding: 8px 14px; margin: 3px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 13px; }
    button.active { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: bold; }
    
    /* 상패 시안 스타일의 수직 입력 폼 박스들 */
    .vertical-input { width: 100%; padding: 12px 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; margin-bottom: 5px; }
    textarea { width: 100%; height: 140px; padding: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: none; font-size: 14px; line-height: 1.6; }
    
    /* 작은 안내 문구 */
    .input-hint { display: block; font-size: 11px; color: #777; margin-bottom: 15px; margin-top: 2px; padding-left: 2px; }

    /* 글자수 선택 영역을 하단으로 빼서 수직 흐름 방해 안 받게 처리 */
    .len-container { margin-top: 15px; }

    .gen-btn { width: 100%; padding: 18px; background: var(--navy); color: gold; font-size: 18px; font-weight: bold; border: none; cursor: pointer; border-radius: 6px; margin-top: 30px; }
    
    .result-grid { display: grid; grid-template-columns: 1fr; gap: 25px; margin-top: 35px; }
    .card { padding: 30px; border: 1px solid #eee; border-left: 4px solid var(--gold); background: #fcfcfc; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    .card h4 { margin: 0 0 15px 0; color: var(--navy); border-bottom: 1px dashed #ddd; padding-bottom: 8px; font-size: 16px; }
    .content { line-height: 1.8; white-space: pre-wrap; font-size: 14px; color: #333; text-align: center; padding: 15px 0; letter-spacing: -0.5px; }
    .copy-btn { margin-top: 15px; background: var(--gold); color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 3px; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>상패다 문구 도우미</h2>
  
  <div class="section-title">1. 상패 종류</div>
  <div id="type-group" class="btn-group">
    <button class="cate-btn active" onclick="selectType(this, '감사패')">감사패</button>
    <button class="cate-btn" onclick="selectType(this, '공로패')">공로패</button>
    <button class="cate-btn" onclick="selectType(this, '기념패')">기념패</button>
    <button class="cate-btn" onclick="selectType(this, '학위패')">학위패</button>
    <button class="cate-btn" onclick="selectType(this, '재직기념패')">재직기념패</button>
    <button class="cate-btn" onclick="selectType(this, '표창패')">표창패</button>
    <button class="cate-btn" onclick="selectType(this, '교회상패')">교회상패</button>
    <button class="cate-btn" onclick="selectType(this, '위촉패')">위촉패</button>
    <button class="cate-btn" onclick="selectType(this, '기타문구')">기타문구</button>
  </div>

  <div class="section-title">2. 대상 분류</div>
  <div id="target-group" class="btn-group">
    <button class="target-btn active" onclick="selectTarget(this, '전체')">전체</button>
    <button class="target-btn" onclick="selectTarget(this, '회사')">회사</button>
    <button class="target-btn" onclick="selectTarget(this, '학교')">학교</button>
    <button class="target-btn" onclick="selectTarget(this, '단체')">단체</button>
    <button class="target-btn" onclick="selectTarget(this, '관공서')">관공서</button>
    <button class="target-btn" onclick="selectTarget(this, '가족')">가족</button>
    <button class="target-btn" onclick="selectTarget(this, '기타')">기타</button>
  </div>

  <div class="section-title">3. 받는 사람 (수하인)</div>
  <input type="text" id="ai-receiver" class="vertical-input" placeholder="예) 이사 홍길동 / 상무 김철수 / 어머니 김정숙">
  <span class="input-hint">* 상패 맨 위 상단에 크게 들어갈 이름을 적어주세요.</span>

  <div class="section-title">4. 본문 상황 및 키워드 입력</div>
  <textarea id="ai-keywords" placeholder="예) 정년퇴직, 지난 20년간의 헌신과 따뜻한 리더십에 깊이 감사드립니다."></textarea>
  <span class="input-hint">* 핵심적인 들어갈 핵심 에피소드나 키워드를 서술형으로 자유롭게 적어주세요.</span>

  <div class="section-title">5. 수여 날짜</div>
  <input type="text" id="ai-date" class="vertical-input" placeholder="예) 2026년 6월 12일 / 2026. 06. 12">
  <span class="input-hint">* 비워두시면 자동으로 오늘 날짜가 적용됩니다.</span>

  <div class="section-title">6. 주는 사람 (수여자)</div>
  <input type="text" id="ai-giver" class="vertical-input" placeholder="예) 주식회사 상패다 임직원 일동 / 삼남매 올림">
  <span class="input-hint">* 상패 맨 아래 하단에 직인과 함께 각인될 단체명이나 성함을 적어주세요.</span>

  <div class="section-title">7. 추천 본문 글자수 고르기</div>
  <div id="len-group" class="btn-group len-container">
    <button class="len-btn active" onclick="selectLen(this, '200')">200자 내외 (풍성하게)</button>
    <button class="len-btn" onclick="selectLen(this, '150')">150자 내외 (적당하게)</button>
    <button class="len-btn" onclick="selectLen(this, '100')">100자 내외 (심플하게)</button>
  </div>

  <button class="gen-btn" onclick="requestAIText()">AI 명품 문구 생성하기</button>

  <div id="result-area" class="result-grid" style="display:none;">
    <div class="card" id="card-formal"><h4>정중한 버전</h4><div class="content"></div><button class="copy-btn" onclick="copyText('formal')">복사하기</button></div>
    <div class="card" id="card-touching"><h4>감동적인 버전</h4><div class="content"></div><button class="copy-btn" onclick="copyText('touching')">복사하기</button></div>
    <div class="card" id="card-creative"><h4>개성적인 버전</h4><div class="content"></div><button class="copy-btn" onclick="copyText('creative')">복사하기</button></div>
  </div>
</div>

<script>
let selectedType = "감사패";
let selectedTarget = "전체";
let selectedLength = "200";

function selectType(btn, val) { document.querySelectorAll('#type-group .cate-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedType = val; }
function selectTarget(btn, val) { document.querySelectorAll('#target-group .target-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedTarget = val; }
function selectLen(btn, val) { document.querySelectorAll('#len-group .len-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedLength = val; }

async function requestAIText() {
  const keywords = document.getElementById('ai-keywords').value;
  const receiverInput = document.getElementById('ai-receiver').value.trim();
  const giverInput = document.getElementById('ai-giver').value.trim();
  let dateInput = document.getElementById('ai-date').value.trim();

  if (!receiverInput) { alert('받는 사람 성함 또는 직함을 입력해 주세요!'); return; }
  if (!keywords.trim()) { alert('상황이나 키워드를 입력해 주세요!'); return; }
  if (!giverInput) { alert('주는 사람을 입력해 주세요!'); return; }
  
  if (!dateInput) {
    const today = new Date();
    dateInput = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;
  }

  const resultArea = document.getElementById('result-area');
  resultArea.style.display = 'grid';
  document.querySelectorAll('.content').forEach(el => el.innerText = '🤖 상패 각인 밸런스에 맞춰 품격 있는 결과물을 빌드하고 있습니다...');

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        type: selectedType, 
        target: selectedTarget, 
        message: keywords, 
        maxLength: selectedLength,
        receiver: receiverInput,
        date: dateInput,
        giver: giverInput
      })
    });
    const data = await response.json();
    
    document.querySelector('#card-formal .content').innerText = data.formal;
    document.querySelector('#card-touching .content').innerText = data.touching;
    document.querySelector('#card-creative .content').innerText = data.creative;
  } catch (e) { 
    alert('네트워크 상태를 확인해 주세요.'); 
  }
}

function copyText(id) {
  const text = document.querySelector(`#card-${id} .content`).innerText;
  navigator.clipboard.writeText(text).then(() => alert('완성된 문구가 복사되었습니다.'));
}
</script>
</body>
</html>
