<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상패다 AI 문구 생성기</title>
  <style>
    :root { --navy: #1a2a44; --gold: #c5a059; }
    body { background: #f4f4f5; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px; background: #fff; border-top: 5px solid var(--navy); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { color: var(--navy); text-align: center; margin-bottom: 30px; letter-spacing: -1px; }
    .section-title { font-size: 16px; color: var(--navy); border-bottom: 2px solid var(--navy); padding-bottom: 5px; margin-bottom: 15px; font-weight: bold; }
    .btn-group { margin-bottom: 20px; }
    button { padding: 10px 16px; margin: 4px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; transition: 0.3s; }
    button.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    textarea { width: 100%; height: 100px; padding: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .gen-btn { width: 100%; padding: 20px; background: var(--navy); color: gold; font-size: 18px; font-weight: bold; border: none; cursor: pointer; border-radius: 6px; }
    
    /* 결과 카드 디자인 */
    .result-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 30px; }
    .card { padding: 20px; border: 1px solid #eee; border-left: 4px solid var(--gold); background: #fcfcfc; position: relative; }
    .card h4 { margin: 0 0 10px 0; color: var(--navy); }
    .copy-btn { margin-top: 10px; background: var(--gold); color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>

<div class="container">
  <h2>상패다 명품 문구 생성 서비스</h2>
  
  <div class="section-title">1. 상패 종류</div>
  <div id="type-group" class="btn-group">
    <button class="cate-btn active" onclick="selectType(this, '감사패')">감사패</button>
    <button class="cate-btn" onclick="selectType(this, '공로패')">공로패</button>
    <button class="cate-btn" onclick="selectType(this, '기념패')">기념패</button>
    <button class="cate-btn" onclick="selectType(this, '재직기념패')">재직기념패</button>
    <button class="cate-btn" onclick="selectType(this, '기타문구')">기타문구</button>
  </div>

  <div class="section-title">2. 키워드 입력</div>
  <textarea id="ai-keywords" placeholder="예: 30년 근속, 헌신적인 노고, 따뜻한 리더십 등"></textarea>

  <button class="gen-btn" onclick="requestAIText()">문구 생성하기</button>

  <div id="result-area" class="result-grid" style="display:none;">
    <div class="card" id="card-formal"><h4>정중한 버전</h4><div class="content"></div><button class="copy-btn" onclick="copyText('formal')">복사하기</button></div>
    <div class="card" id="card-touching"><h4>감동적인 버전</h4><div class="content"></div><button class="copy-btn" onclick="copyText('touching')">복사하기</button></div>
    <div class="card" id="card-creative"><h4>개성적인 버전</h4><div class="content"></div><button class="copy-btn" onclick="copyText('creative')">복사하기</button></div>
  </div>
</div>

<script>
let selectedType = "감사패";

function selectType(btn, val) { 
  document.querySelectorAll('.cate-btn').forEach(b=>b.classList.remove('active')); 
  btn.classList.add('active'); selectedType = val; 
}

async function requestAIText() {
  const keywords = document.getElementById('ai-keywords').value;
  if (!keywords) { alert('내용을 입력하세요'); return; }
  
  const resultArea = document.getElementById('result-area');
  resultArea.style.display = 'grid';
  document.querySelectorAll('.content').forEach(el => el.innerText = '생성 중...');

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: selectedType, target: '전체', message: keywords, maxLength: 200 })
    });
    const data = await response.json();
    
    document.querySelector('#card-formal .content').innerText = data.formal;
    document.querySelector('#card-touching .content').innerText = data.touching;
    document.querySelector('#card-creative .content').innerText = data.creative;
  } catch (e) {
    alert('오류 발생');
  }
}

function copyText(id) {
  const text = document.querySelector(`#card-${id} .content`).innerText;
  navigator.clipboard.writeText(text).then(() => alert('복사되었습니다.'));
}
</script>
</body>
</html>
