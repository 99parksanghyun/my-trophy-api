<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상패다 문구 도우미</title>
  <style>
    :root { --navy: #1a2a44; --gold: #c5a059; }
    body { background: #f4f4f5; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; padding: 20px; }
    
    /* 팝업으로 쓰기 좋게 전체 가로폭을 컴팩트하게 조절 */
    .container { max-width: 950px; margin: 0 auto; padding: 35px; background: #fff; border-top: 5px solid var(--navy); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 0 0 8px 8px; }
    h2 { color: var(--navy); text-align: center; margin-bottom: 25px; letter-spacing: -1px; font-size: 22px; }
    .section-title { font-size: 14px; color: var(--navy); border-bottom: 2px solid var(--navy); padding-bottom: 5px; margin: 20px 0 10px 0; font-weight: bold; }
    .btn-group { margin-bottom: 12px; }
    button { padding: 7px 12px; margin: 2px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 12.5px; }
    button.active { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: bold; }
    
    .vertical-input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13.5px; margin-bottom: 3px; }
    textarea { width: 100%; height: 110px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: none; font-size: 13.5px; line-height: 1.5; }
    .input-hint { display: block; font-size: 11px; color: #777; margin-bottom: 12px; margin-top: 1px; padding-left: 2px; }

    .gen-btn { width: 100%; padding: 15px; background: var(--navy); color: gold; font-size: 16px; font-weight: bold; border: none; cursor: pointer; border-radius: 6px; margin-top: 20px; }
    
    /* ⚠️ 결과창 틀에 고정 높이를 주어 내부에 스크롤바(휠)가 생성되도록 유도 */
    .result-scroll-box { 
      margin-top: 25px; 
      max-height: 520px; 
      overflow-y: scroll; /* 스크롤바 상시 활성화 */
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      background: #fafafa;
      padding: 20px 10px 20px 20px;
    }
    
    /* ⚠️ 우측 스크롤바(휠) 디자인을 강조하여 티가 나게 설정 */
    .result-scroll-box::-webkit-scrollbar { width: 10px; }
    .result-scroll-box::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 6px; }
    .result-scroll-box::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 6px; border: 2px solid #f1f1f1; }
    .result-scroll-box::-webkit-scrollbar-thumb:hover { background: var(--navy); }
    
    /* ✨ [원상복구] 결과창을 다시 시원한 가로 3열 배열로 정렬 */
    .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
    @media (max-width: 768px) { .result-grid { grid-template-columns: 1fr; } } 
    
    .card { padding: 20px; border: 1px solid #eee; border-top: 4px solid var(--gold); background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; }
    .card h4 { margin: 0 0 15px 0; color: var(--navy); border-bottom: 1px dashed #ddd; padding-bottom: 8px; font-size: 15px; text-align: center; }
    
    .trophy-preview { display: flex; flex-direction: column; flex-grow: 1; padding: 5px 0; }
    
    /* 상패 종류 (가운데 정렬) */
    .p-type { text-align: center; font-size: 17px; font-weight: bold; color: var(--navy); margin-bottom: 12px; letter-spacing: 2px; }
    
    /* 받는 사람 (본문 폭 기준 우측 정렬) */
    .p-receiver { text-align: right; font-size: 13.5px; font-weight: bold; color: #333; margin-bottom: 15px; padding-right: 5px; }
    
    /* 본문, 날짜, 주는사람 (기본 가운데 정렬) */
    .p-body { line-height: 1.7; white-space: pre-wrap; font-size: 13px; color: #444; text-align: center; margin-bottom: 20px; letter-spacing: -0.5px; }
    .p-date { text-align: center; font-size: 12.5px; color: #666; margin-bottom: 4px; }
    .p-giver { text-align: center; font-size: 13.5px; font-weight: bold; color: #222; }

    .copy-btn { margin-top: 15px; background: #f4f4f5; color: #444; border: 1px solid #ddd; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: bold; width: 100%; transition: 0.2s; }
    .copy-btn:hover { background: var(--gold); color: white; border-color: var(--gold); }
  </style>
</head>
<body>

<div class="container">
  <h2>상패다 문구 도우미</h2>
  
  <div class="section-title">1. 상패 종류</div>
  <div id="type-group" class="btn-group">
    <button class="cate-btn active" onclick="selectType(this, '감사패')">감사패</button>
    <button class="cate-btn" onclick="selectType(this, '공로패')">공로패</button>
    <button class="cate-btn" onclick="selectType(this, '기념패')">기념패</button>
    <button class="cate-btn" onclick="selectType(this, '학위패')">학위패</button>
    <button class="cate-btn" onclick="selectType(this, '재직기념패')">재직기념패</button>
    <button class="cate-btn" onclick="selectType(this, '표창패')">표창패</button>
    <button class="cate-btn" onclick="selectType(this, '교회상패')">교회상패</button>
    <button class="cate-btn" onclick="selectType(this, '위촉패')">위촉패</button>
    <button class="cate-btn" onclick="selectType(this, '기타문구')">기타문구</button>
  </div>

  <div class="section-title">2. 대상 분류</div>
  <div id="target-group" class="btn-group">
    <button class="target-btn active" onclick="selectTarget(this, '전체')">전체</button>
    <button class="target-btn" onclick="selectTarget(this, '회사')">회사</button>
    <button class="target-btn" onclick="selectTarget(this, '학교')">학교</button>
    <button class="target-btn" onclick="selectTarget(this, '단체')">단체</button>
    <button class="target-btn" onclick="selectTarget(this, '관공서')">관공서</button>
    <button class="target-btn" onclick="selectTarget(this, '가족')">가족</button>
    <button class="target-btn" onclick="selectTarget(this, '기타')">기타</button>
  </div>

  <div class="section-title">3. 받는 사람 (수하인)</div>
  <input type="text" id="ai-receiver" class="vertical-input" placeholder="예) 이사 홍길동 / 상무 김철수 / 어머니 김정숙">
  <span class="input-hint">* 상패 맨 위 상단에 크게 들어갈 이름을 적어주세요.</span>

  <div class="section-title">4. 본문 상황 및 키워드 입력</div>
  <textarea id="ai-keywords" placeholder="예) 정년퇴직, 지난 20년간의 헌신과 따뜻한 리더십에 깊이 감사드립니다."></textarea>
  <span class="input-hint">* 핵심적인 들어갈 핵심 에피소드나 키워드를 서술형으로 자유롭게 적어주세요.</span>

  <div class="section-title">5. 수여 날짜</div>
  <input type="text" id="ai-date" class="vertical-input" placeholder="예) 2026년 6월 12일 / 2026. 06. 12">
  <span class="input-hint">* 비워두시면 자동으로 오늘 날짜가 적용됩니다.</span>

  <div class="section-title">6. 주는 사람 (수여자)</div>
  <input type="text" id="ai-giver" class="vertical-input" placeholder="예) 주식회사 상패다 임직원 일동 / 삼남매 올림">
  <span class="input-hint">* 상패 맨 아래 하단에 직인과 함께 각인될 단체명이나 성함을 적어주세요.</span>

  <div class="section-title">7. 추천 본문 글자수 고르기</div>
  <div id="len-group" class="btn-group">
    <button class="len-btn active" onclick="selectLen(this, '200')">200자 내외 (풍성하게)</button>
    <button class="len-btn" onclick="selectLen(this, '150')">150자 내외
