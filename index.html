<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>상패다 AI 문구 사전 테스트창</title>
  <style>
    .cate-btn, .target-btn, .len-btn { padding: 10px 14px; margin: 4px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; font-size: 14px; }
    .active { background: #0056b3; color: #fff; border-color: #0056b3; font-weight: bold; }
    button:hover { background: #f5f5f5; }
  </style>
</head>
<body style="background:#f5f5f5; padding: 30px; font-family: 'Malgun Gothic', sans-serif;">

<div style="max-width: 850px; margin: 0 auto; padding: 30px; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
  <h2 style="text-align: center; margin-bottom: 30px; color: #222;">🎯 상패다 AI 문구 사전 테스트 화면</h2>
  
  <div style="margin-bottom: 25px;">
    <h4 style="margin-bottom: 8px; font-size: 15px; border-left: 3px solid #0056b3; padding-left: 8px;">1. 상패 분류 선택 (쇼핑몰 대분류 버튼 똑같이 적용)</h4>
    <div id="type-group" style="line-height: 2.2;">
      <button class="cate-btn active" onclick="selectType(this, '감사패')">감사패</button>
      <button class="cate-btn" onclick="selectType(this, '공로패')">공로패</button>
      <button class="cate-btn" onclick="selectType(this, '기념패')">기념패</button>
      <button class="cate-btn" onclick="selectType(this, '학위패')">학위패</button>
      <button class="cate-btn" onclick="selectType(this, '재직기념패')">재직기념패</button>
      <button class="cate-btn" onclick="selectType(this, '표창패')">표창패</button>
      <button class="cate-btn" onclick="selectType(this, '교회상패')">교회상패</button>
      <button class="cate-btn" onclick="selectType(this, '위촉패')">위촉패</button>
      <button class="cate-btn" onclick="selectType(this, '기타문구')">기타문구</button>
    </div>
  </div>

  <div style="margin-bottom: 25px;">
    <h4 style="margin-bottom: 8px; font-size: 15px; border-left: 3px solid #0056b3; padding-left: 8px;">2. 대상 분류 선택</h4>
    <div id="target-group">
      <button class="target-btn active" onclick="selectTarget(this, '전체')">전체</button>
      <button class="target-btn" onclick="selectTarget(this, '회사')">회사</button>
      <button class="target-btn" onclick="selectTarget(this, '학교')">학교</button>
      <button class="target-btn" onclick="selectTarget(this, '단체')">단체</button>
      <button class="target-btn" onclick="selectTarget(this, '관공서')">관공서</button>
      <button class="target-btn" onclick="selectTarget(this, '가족')">가족</button>
      <button class="target-btn" onclick="selectTarget(this, '기타')">기타</button>
    </div>
  </div>

  <div style="display: flex; gap: 20px; margin-bottom: 25px;">
    <div style="flex: 2;">
      <h4 style="margin-bottom: 8px; font-size: 15px; border-left: 3px solid #0056b3; padding-left: 8px;">3. 상황 및 키워드 입력</h4>
      <textarea id="ai-keywords" placeholder="예) 이사님 정년퇴직, 존경 표현, 상패다 임직원 일동" style="width: 96%; height: 110px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; resize: none; font-size: 14px; line-height: 1.5;"></textarea>
    </div>
    <div style="flex: 1;">
      <h4 style="margin-bottom: 8px; font-size: 15px; border-left: 3px solid #0056b3; padding-left: 8px;">4. 추천 글자수</h4>
      <div id="len-group">
        <button class="len-btn active" onclick="selectLen(this, '200')">200자 내외</button>
        <button class="len-btn" onclick="selectLen(this, '150')">150자 내외</button>
        <button class="len-btn" onclick="selectLen(this, '100')">100자 내외</button>
        <button class="len-btn" onclick="selectLen(this, '50')">50자 내외</button>
      </div>
    </div>
  </div>

  <button onclick="requestAIText()" style="width: 100%; padding: 16px; background: #0056b3; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;">
    AI 문구 생성하기 (테스트 실행)
  </button>

  <div id="ai-output-box" style="display: none; margin-top: 30px; padding: 20px; background: #fafafa; border: 1px dashed #0056b3; border-radius: 6px;">
    <h4 style="margin: 0 0 12px 0; color: #0056b3; font-size: 16px; font-weight: bold;">✨ AI 추천 결과 창</h4>
    <div id="ai-output-text" style="line-height: 1.8; white-space: pre-wrap; font-size: 15px; background:#fff; padding:18px; border:1px solid #eee; color:#333; border-radius: 4px;"></div>
  </div>
</div>

<script>
let selectedType = "감사패";
let selectedTarget = "전체";
let selectedLength = "200";

function selectType(btn, val) { document.querySelectorAll('#type-group .cate-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedType = val; }
function selectTarget(btn, val) { document.querySelectorAll('#target-group .target-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedTarget = val; }
function selectLen(btn, val) { document.querySelectorAll('#len-group .len-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedLength = val; }

async function requestAIText() {
  const keywords = document.getElementById('ai-keywords').value;
  const outputBox = document.getElementById('ai-output-box');
  const outputText = document.getElementById('ai-output-text');

  if (!keywords.trim()) { alert('상황이나 키워드를 입력해 주세요!'); return; }

  outputBox.style.display = 'block';
  outputText.innerText = '🤖 사장님이 등록하신 [상패다] 전용 명품 예문을 읽어 문구를 지으러 가는 중입니다...';

  try {
    // 💡 CMD 창에 떴던 고정 변하지 않는 고유 영구 주소(Aliased)로 완벽하게 묶었습니다!
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: selectedType, target: selectedTarget, message: keywords, maxLength: selectedLength })
    });
    const data = await response.json();
    if (data.text) {
      outputText.innerText = data.text;
    } else {
      outputText.innerText = '서버 연결은 되었으나 AI가 답변을 생성하지 못했습니다. 대괄호 분류 명칭이나 OpenAI 키를 확인해 보세요.';
    }
  } catch (e) {
    outputText.innerText = '네트워크 연결 상태를 확인해 주세요. 브라우저가 임시 주소를 차단하는 경우 시스템 환경 설정을 점검해야 합니다.';
  }
}
</script>

</body>
</html>
